name: CI
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Run every Monday at 00:30 UTC
    - cron: "30 0 * * 1"
  workflow_dispatch:
permissions:
  contents: read

jobs:
  mise-cache:
    uses: nikobockerman/github-workflows/.github/workflows/mise-prepare-cache.yaml@1d0ee1b00422598a785e5620925ce2ec0de2b6d3
  build-test-run:
    needs: mise-cache
    uses: ./.github/workflows/build-test-run.yaml
  check-prettier:
    needs: mise-cache
    uses: nikobockerman/github-workflows/.github/workflows/mise-task.yaml@1d0ee1b00422598a785e5620925ce2ec0de2b6d3
    with:
      task: check:prettier
  check-renovate-config:
    needs: mise-cache
    uses: nikobockerman/github-workflows/.github/workflows/mise-task.yaml@1d0ee1b00422598a785e5620925ce2ec0de2b6d3
    with:
      task: check:renovateconfig
  check-rustfmt:
    needs: mise-cache
    uses: nikobockerman/github-workflows/.github/workflows/mise-task.yaml@1d0ee1b00422598a785e5620925ce2ec0de2b6d3
    with:
      task: check:rustfmt

  check:
    needs:
      - build-test-run
      - check-prettier
      - check-renovate-config
      - check-rustfmt
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
